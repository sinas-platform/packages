apiVersion: sinas.co/v1
kind: SinasPackage
package:
  name: sinas-package-author
  version: "0.2.0"
  description: >
    Skills + reference agent for authoring Sinas Packages. Split into focused
    skills: schema/workflow (preloaded), plus on-demand patterns for functions,
    connectors, queries, and agents.
  author: Sinas
  url: https://github.com/sinas-platform/sinas-packages

spec:
  # ─────────────────────────────────────────────
  # Collection: versioned storage for package drafts
  # ─────────────────────────────────────────────
  collections:
    - namespace: sinas
      name: packages
      allowSharedFiles: true
      allowPrivateFiles: true
      maxFileSizeMb: 10
      maxTotalSizeGb: 1

  # ─────────────────────────────────────────────
  # Skills — split by topic for context efficiency
  #
  # Preloaded:
  #   sinas/package-schema    — always needed (schema, workflow, pitfalls)
  #
  # On-demand (fetched when the agent needs them):
  #   sinas/function-patterns  — handler, context, SDK, dependencies
  #   sinas/connector-patterns — auth, operations, parameters
  #   sinas/query-patterns     — SQL, connectionName, parameterization
  #   sinas/agent-patterns     — enabledX, system prompt, skills
  # ─────────────────────────────────────────────
  skills:
    # ── Preloaded: schema + workflow ──
    - namespace: sinas
      name: package-schema
      description: >
        Core knowledge for authoring Sinas Packages: YAML schema, available
        tools, authoring workflow, file-backed drafting, iteration, common
        pitfalls, and what packages can/cannot create. Always preload this.
      content: |
        # Sinas Package Author — Schema & Workflow

        You author Sinas Packages — installable bundles of resources that can
        be applied to a Sinas instance idempotently. A package is a YAML file
        with `kind: SinasPackage` that declares the resources it wants to
        create. Installing the package creates those resources, tagged with
        `managed_by: pkg:<name>`, so they can be cleanly uninstalled later.

        ## Your tools

        Use package management tools in this order:

        1. **`sinas_package_validate(yaml)`** — Cheap. Returns `{valid, errors,
           warnings}`. Run after every edit. **Never skip validation.**

        2. **`sinas_package_preview(yaml)`** — Dry-run install. Shows what
           would be created/updated/skipped. Run once validation is clean
           and **share the diff with the user before installing**.

        3. **`sinas_package_install(yaml)`** — Actually installs. Requires
           user approval via approval card.

        4. **`sinas_package_list()`** — See what's installed.

        5. **`sinas_package_export(name)`** — Read an installed package as YAML.

        6. **`sinas_package_uninstall(name)`** — Remove a package (requires approval).

        If you have config introspection:

        7. **`sinas_config_inspect()`** — Resource type counts (overview).
        8. **`sinas_config_list(type, namespace?)`** — Names + descriptions.
        9. **`sinas_config_get(type, namespace, name)`** — Full resource detail.

        If you have database introspection:

        10. **`sinas_db_list_tables(connectionName)`** — Tables with row counts
            and annotations.
        11. **`sinas_db_describe_table(table, connectionName)`** — Columns,
            types, indexes, foreign keys, annotations.

        ## Schema essentials

        ```yaml
        apiVersion: sinas.co/v1
        kind: SinasPackage
        package:
          name: my-package
          version: "0.1.0"
          description: What this package does.
          author: Your Name
          url: https://github.com/your/repo
        spec:
          collections: []
          queries: []
          functions: []
          agents: []
          skills: []
          stores: []
          components: []
          connectors: []
          manifests: []
          templates: []
          webhooks: []
          schedules: []
          databaseTriggers: []
          dependencies: []
        ```

        All sections are optional. Include only what you need.

        ## What packages CAN create

        - `collections` — File collections with metadata schemas
        - `queries` — Parameterized SQL queries against database connections
        - `functions` — Python functions in the function runtime
        - `agents` — LLM agents with tool wiring and system prompts
        - `skills` — Knowledge resources loaded into agents
        - `stores` — Key-value state stores
        - `components` — Renderable UI components
        - `connectors` — HTTP API connectors with operations and auth
        - `manifests` — Application manifests
        - `templates` — Reusable templates
        - `webhooks` — Inbound webhook handlers
        - `schedules` — Scheduled jobs
        - `databaseTriggers` — Database event triggers
        - `dependencies` — Python packages (installed on worker restart)

        ## What packages CANNOT create

        - **`roles`** — permission management is admin-only
        - **`users`** — user management is admin-only
        - **`llmProviders`** — LLM API keys are infrastructure
        - **`databaseConnections`** — DB credentials are infrastructure

        Suggest the admin create these manually when a user asks.

        ## Naming conventions

        - **`namespace`**: kebab-case (`leaseco`, `hubspot`, `mb-sales-ops`)
        - **queries**: kebab-case (`search-cases`, `init-schema`)
        - **functions**: snake_case (`extract_entities`, `process_thing`)
        - **agents**: kebab-case (`order-processor`, `sales-pipeline`)

        ## The authoring workflow

        **Always write to a file first.** The file is the source of truth.
        Use `file_path` on validate/preview/install — the tool reads the
        file directly, no need to pass inline YAML. This enables surgical
        edits and avoids wasting tokens on large inline content.

        1. **Clarify scope.** Ask 1-2 pointed questions if vague.

        2. **Fetch pattern skills.** Before writing functions, connectors,
           queries, or agents, fetch the relevant on-demand skill.

        3. **Draft the YAML.** Show it to the user in a code fence.

        4. **Write to file.** Save the draft:
           `write_file_sinas_packages(filename: "my-pkg.yaml", content: yaml)`

        5. **Validate from file.** Pass the file path directly:
           `sinas_package_validate(file_path: "sinas/packages/my-pkg.yaml")`
           Fix errors using `edit_file_sinas_packages(filename, old, new)`
           and re-validate. Do NOT regenerate the full YAML.

        6. **Preview from file.**
           `sinas_package_preview(file_path: "sinas/packages/my-pkg.yaml")`
           Share the diff with the user.

        7. **Install from file.**
           `sinas_package_install(file_path: "sinas/packages/my-pkg.yaml")`
           User sees an approval card and must approve.

        8. **Verify.** Call introspection queries to confirm it works.

        ## Iteration

        - Use `edit_file_sinas_packages(filename, old_string, new_string)`
          for surgical changes — never regenerate the full YAML
        - After every edit, re-validate with `file_path`
        - Re-installing updates in place (idempotent apply)
        - Bump version on meaningful changes (semver)

        ## Common pitfalls

        - **Missing `connectionName`** on queries — always specify explicitly
        - **camelCase everywhere** in YAML keys (`enabledQueries`, `inputSchema`,
          `connectionName`). Only snake_case inside SQL and Python.
        - **Reference format**: always `namespace/name`, never just `name`
        - **Tool wiring**: agents must list every tool explicitly in `enabled*`
        - **Unknown YAML keys are rejected** — no `pipPackages`, only `dependencies`

        ## When the user wants something a package can't do

        - "Add a role" → admin creates it via UI, then reference in queries
        - "Connect to my database" → admin adds connection in settings,
          give you the name, you wire queries to it
        - "Set up API key" → admin configures provider, agents inherit default

        ## Resource pattern skills

        For detailed patterns when writing specific resource types, fetch
        the on-demand skills:

        - **Functions**: `sinas/function-patterns` — handler, context, SDK, deps
        - **Connectors**: `sinas/connector-patterns` — auth, operations, params
        - **Queries**: `sinas/query-patterns` — SQL, params, init-schema
        - **Agents**: `sinas/agent-patterns` — enabledX, prompts, skills

    # ── On-demand: function patterns ──
    - namespace: sinas
      name: function-patterns
      description: >
        How to write Sinas functions: handler signature, context dict,
        Sinas Python SDK, raw requests, secrets, and dependency declaration.
      content: |
        # Function Patterns

        ## Handler signature

        Every function MUST define this exact entry point:

        ```python
        def handler(input_data, context):
            # input_data: dict — validated input from inputSchema
            # context: dict with these keys:
            #   "access_token"  — JWT bearer token for Sinas API calls
            #   "user_id"       — calling user's UUID
            #   "user_email"    — calling user's email
            #   "execution_id"  — unique ID for this execution
            #   "trigger_type"  — "manual", "agent", "webhook", "schedule", etc.
            #   "chat_id"       — chat UUID (if triggered by agent, else None)
            #   "secrets"       — dict {"SECRET_NAME": "value"}
            return {"result": "..."}
        ```

        ## YAML definition

        ```yaml
        - namespace: myns
          name: process_thing
          description: Process a thing and return the result.
          sharedPool: true
          timeout: 30
          inputSchema:
            type: object
            properties:
              thing_id:
                type: string
            required: [thing_id]
          code: |
            def handler(input_data, context):
                thing_id = input_data["thing_id"]
                return {"thing_id": thing_id, "status": "processed"}
        ```

        Set `requiresApproval: true` for dangerous side effects.

        ## Dependencies

        If your function imports anything beyond stdlib, add to
        `spec.dependencies` (NOT `pipPackages` — unknown keys are rejected):

        ```yaml
        spec:
          dependencies:
            - packageName: pandas
            - packageName: python-pptx
              version: "0.6.21"
          functions:
            - namespace: myns
              name: generate_report
              code: |
                import pandas as pd
                def handler(input_data, context):
                    ...
        ```

        ## Sinas Python SDK

        Pre-installed in all containers as `sinas==0.1.7`:

        ```python
        from sinas import SinasClient

        def handler(input_data, context):
            client = SinasClient(
                base_url="http://host.docker.internal:8000",
                token=context["access_token"],
            )

            # Execute a query
            resp = client._request("POST",
                "/queries/myns/get-record/execute",
                json={"input": {"id": "123"}},
            )

            # File operations — note argument order:
            #   upload_bytes(namespace, collection, name, content, content_type)
            client.files.list("ns", "collection")
            content_bytes = client.files.download_bytes("ns", "collection", "filename")
            client.files.upload_bytes(
                namespace="ns",
                collection="collection",
                name="file.txt",
                content=b"raw bytes here",
                content_type="text/plain",
            )

            # State operations
            client.state.set(store="ns/name", key="k", value={"data": 1})
            client.state.list(store="ns/name")

            # Agent invoke
            client.chats.invoke("ns", "agent-name", message="...")

            return {"result": resp}
        ```

        ## Raw requests alternative

        ```python
        def handler(input_data, context):
            import requests
            base_url = "http://host.docker.internal:8000"
            headers = {"Authorization": f"Bearer {context['access_token']}"}

            resp = requests.post(
                f"{base_url}/queries/myns/get-record/execute",
                headers=headers,
                json={"input": {"id": "123"}},
                timeout=10,
            )
            return resp.json()
        ```

        ## Secrets

        ```python
        def handler(input_data, context):
            api_key = context["secrets"]["OPENAI_API_KEY"]
            # Use api_key directly...
        ```

        Secrets are resolved per-user (private overrides shared).

    # ── On-demand: connector patterns ──
    - namespace: sinas
      name: connector-patterns
      description: >
        How to define HTTP API connectors: auth types, operations,
        parameters, retry config, and agent wiring.
      content: |
        # Connector Patterns

        ## Full example

        ```yaml
        - namespace: hubspot
          name: crm-api
          description: HubSpot CRM v3 API
          baseUrl: https://api.hubapi.com
          auth:
            type: bearer
            secret: "{{HUBSPOT_ACCESS_TOKEN}}"
          headers:
            Content-Type: application/json
          retry:
            maxAttempts: 3
            backoff: exponential
          timeoutSeconds: 30
          operations:
            - name: search-deals
              method: POST
              path: /crm/v3/objects/deals/search
              description: Search deals with filters and sorts
              parameters:
                - name: body
                  in: body
                  schema:
                    type: object
                    properties:
                      filterGroups:
                        type: array
                      sorts:
                        type: array
                      limit:
                        type: integer
                      properties:
                        type: array
                        items:
                          type: string
            - name: get-deal
              method: GET
              path: /crm/v3/objects/deals/{dealId}
              description: Get a specific deal by ID
              parameters:
                - name: dealId
                  in: path
                  schema:
                    type: string
                - name: properties
                  in: query
                  schema:
                    type: string
                    description: Comma-separated property names
        ```

        ## Auth types

        - `type: bearer` with `secret: "{{SECRET_NAME}}"` — references a
          Sinas secret
        - `type: apiKey` with `header`, `position` (`header`/`query`),
          `paramName`

        ## Operations

        Each operation has: `name`, `method`, `path`, `description`,
        `parameters`.

        Path parameters use `{paramName}` syntax.

        Parameter `in` values: `path`, `query`, `body`, `header`.

        ## Agent wiring

        ```yaml
        enabledConnectors:
          - connector: hubspot/crm-api
            operations: [search-deals, get-deal]
        ```

        Operations listed here are the only ones the agent can call.

    # ── On-demand: query patterns ──
    - namespace: sinas
      name: query-patterns
      description: >
        How to write parameterized SQL queries: bind parameters,
        inputSchema, connectionName, read vs write, init-schema pattern.
      content: |
        # Query Patterns

        ## Parameterized query

        ```yaml
        - namespace: myns
          name: search-things
          description: Search things by keyword.
          connectionName: built-in
          operation: read
          timeoutMs: 5000
          maxRows: 100
          inputSchema:
            type: object
            properties:
              keyword:
                type: string
                description: Search term (matched with ILIKE).
            required: [keyword]
          sql: |
            SELECT id, name, summary
            FROM things
            WHERE name ILIKE '%' || :keyword || '%'
            ORDER BY created_at DESC
        ```

        ## Key rules

        - Always use `:param_name` bind parameters — NEVER inline values
        - Always specify `connectionName` explicitly
        - `operation: read` for SELECT, `operation: write` for INSERT/UPDATE/DELETE
        - `maxRows` caps results for read queries (default 1000)
        - `timeoutMs` prevents runaway queries

        ## Schema initialization pattern

        ```yaml
        - namespace: myns
          name: init-schema
          description: Create tables. Safe to run multiple times.
          connectionName: built-in
          operation: write
          timeoutMs: 30000
          sql: |
            CREATE TABLE IF NOT EXISTS things (
                id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                name TEXT NOT NULL,
                summary TEXT,
                created_at TIMESTAMPTZ DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_things_name ON things (name);
        ```

        ## Seeding data pattern

        Create single-row insert queries that scripts call in a loop:

        ```yaml
        - namespace: myns
          name: seed-thing
          connectionName: built-in
          operation: write
          inputSchema:
            type: object
            properties:
              name: { type: string }
              summary: { type: string }
            required: [name]
          sql: |
            INSERT INTO things (name, summary) VALUES (:name, :summary)
            ON CONFLICT DO NOTHING
        ```

        ## Anti-pattern

        NEVER create a generic `exec-sql` query that takes raw SQL as a
        parameter. It's a SQL injection vector.

    # ── On-demand: agent patterns ──
    - namespace: sinas
      name: agent-patterns
      description: >
        How to configure agents: enabledX fields, system prompts, skills,
        systemTools, collections, connectors, hooks, and input schema.
      content: |
        # Agent Patterns

        ## Basic agent

        ```yaml
        - namespace: myns
          name: my-agent
          description: What this agent does.
          model: claude-sonnet-4-6
          temperature: 0.2
          systemPrompt: |
            You are ... Use these tools to ...
          enabledQueries:
            - myns/search-things
          enabledFunctions:
            - myns/process_thing
          enabledSkills:
            - skill: myns/methodology
              preload: true
        ```

        ## Key rules

        - List every tool explicitly in `enabled*` — no implicit access
        - `enabledSkills` with `preload: true` injects into system prompt;
          `preload: false` (default) makes it a fetchable tool
        - Keep system prompts concrete: what the agent does, what tools
          it has, the workflow. No vague "be helpful."

        ## Collections with access mode

        ```yaml
        enabledCollections:
          - collection: myns/documents
            access: readonly
          - collection: myns/drafts
            access: readwrite
        ```

        `readwrite` enables `write_file_*`, `edit_file_*`, `delete_file_*`
        tools. `readonly` (default) gives `search_collection_*` and
        `get_file_*` only.

        ## Connector wiring

        ```yaml
        enabledConnectors:
          - connector: hubspot/crm-api
            operations: [search-deals, get-deal]
        ```

        Only listed operations are exposed as tools.

        ## System tools

        ```yaml
        systemTools:
          - codeExecution
          - packageManagement
          - configIntrospection
          - name: databaseIntrospection
            connections:
              - built-in
        ```

        ## Input schema

        Validates input variables passed when creating a chat:

        ```yaml
        inputSchema:
          type: object
          properties:
            company_name:
              type: string
            pipeline_id:
              type: string
          required: [company_name]
        ```

        Input variables are available in system prompt via Jinja2:
        `{{ company_name }}`.

        ## Stores

        ```yaml
        enabledStores:
          - store: myns/memory
            access: readwrite
          - store: myns/config
            access: readonly
        ```

  # ─────────────────────────────────────────────
  # Reference agent
  # ─────────────────────────────────────────────
  agents:
    - namespace: sinas
      name: package-author
      description: >
        Drafts, validates, previews, and installs Sinas packages on the
        user's behalf. Has access to package management system tools.
      temperature: 0.2
      systemTools:
        - packageManagement
        - configIntrospection
        - name: databaseIntrospection
          connections:
            - built-in
      enabledCollections:
        - collection: sinas/packages
          access: readwrite
      enabledSkills:
        - skill: sinas/package-schema
          preload: true
        - skill: sinas/function-patterns
          preload: false
        - skill: sinas/connector-patterns
          preload: false
        - skill: sinas/query-patterns
          preload: false
        - skill: sinas/agent-patterns
          preload: false
      systemPrompt: |
        You help users author Sinas packages — installable YAML bundles of
        queries, functions, agents, and other resources.

        CRITICAL WORKFLOW — always write to a file first:

        1. Draft the YAML, show it to the user
        2. Write to file: `write_file_sinas_packages("pkg-name.yaml", yaml)`
        3. Validate from file: `sinas_package_validate(file_path: "sinas/packages/pkg-name.yaml")`
        4. Fix errors with `edit_file_sinas_packages("pkg-name.yaml", old, new)`
           — NEVER regenerate the full YAML, always use surgical edits
        5. Preview from file: `sinas_package_preview(file_path: "sinas/packages/pkg-name.yaml")`
        6. Install from file: `sinas_package_install(file_path: "sinas/packages/pkg-name.yaml")`

        Before writing functions/connectors/queries/agents, fetch the
        relevant pattern skill (e.g. `get_skill_sinas__function_patterns`).

        Never bypass validation. Never invent schema fields. Be terse.
